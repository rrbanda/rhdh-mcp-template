<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003B70;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#002A52;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0072CE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#005EA6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lightBlueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1DE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0088C6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#007A87;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00626E;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001A33" flood-opacity="0.25"/>
    </filter>
    <filter id="innerShadow" x="-1%" y="-1%" width="102%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" rx="0" fill="#F5F6F8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="60" fill="url(#navyGrad)"/>
  <text x="40" y="39" fill="#FFFFFF" font-size="22" font-weight="700" letter-spacing="0.5">Self-Service MCP Servers with AI-Powered Development</text>
  <rect x="0" y="56" width="1100" height="4" fill="#E31837"/>

  <!-- Developer bar at top -->
  <rect x="40" y="82" width="1020" height="44" rx="6" fill="url(#navyGrad)" filter="url(#shadow)"/>
  <text x="550" y="110" fill="#FFFFFF" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="2">D E V E L O P E R</text>

  <!-- Arrow down from developer -->
  <polygon points="550,126 540,136 544,136 544,146 556,146 556,136 560,136" fill="#003B70"/>

  <!-- LAYER 1: Developer Experience -->
  <rect x="40" y="150" width="1020" height="150" rx="8" fill="#FFFFFF" stroke="#0072CE" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="150" width="1020" height="32" rx="8" fill="url(#blueGrad)"/>
  <rect x="40" y="170" width="1020" height="12" fill="url(#blueGrad)"/>
  <text x="60" y="173" fill="#FFFFFF" font-size="13" font-weight="700" letter-spacing="1.5">DEVELOPER EXPERIENCE</text>

  <!-- RHDH box -->
  <rect x="70" y="196" width="460" height="88" rx="6" fill="#EBF3FA" stroke="#0072CE" stroke-width="1" filter="url(#innerShadow)"/>
  <text x="90" y="218" fill="#003B70" font-size="14" font-weight="700">Red Hat Developer Hub</text>
  <line x1="90" y1="224" x2="280" y2="224" stroke="#E31837" stroke-width="1.5"/>
  <text x="90" y="242" fill="#3C4858" font-size="12">Software Templates  golden-path scaffolding</text>
  <text x="90" y="258" fill="#3C4858" font-size="12">Service Catalog  single pane of glass</text>
  <text x="90" y="274" fill="#3C4858" font-size="12">CI / CD / Topology  full pipeline visibility</text>

  <!-- Dev Spaces box -->
  <rect x="560" y="196" width="470" height="88" rx="6" fill="#EBF3FA" stroke="#0072CE" stroke-width="1" filter="url(#innerShadow)"/>
  <text x="580" y="218" fill="#003B70" font-size="14" font-weight="700">OpenShift Dev Spaces</text>
  <line x1="580" y1="224" x2="750" y2="224" stroke="#E31837" stroke-width="1.5"/>
  <text x="580" y="242" fill="#3C4858" font-size="12">Cloud IDE  VS Code in the browser</text>
  <text x="580" y="258" fill="#3C4858" font-size="12">Goose AI Agent  on-prem coding assistant</text>
  <text x="580" y="274" fill="#3C4858" font-size="12">Agent Skills &amp; .goosehints  team recipes</text>

  <!-- Arrow down -->
  <polygon points="550,300 540,310 544,310 544,320 556,320 556,310 560,310" fill="#0072CE"/>

  <!-- LAYER 2: CI/CD Automation -->
  <rect x="40" y="324" width="1020" height="166" rx="8" fill="#FFFFFF" stroke="#00A1DE" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="324" width="1020" height="32" rx="8" fill="url(#lightBlueGrad)"/>
  <rect x="40" y="344" width="1020" height="12" fill="url(#lightBlueGrad)"/>
  <text x="60" y="347" fill="#FFFFFF" font-size="13" font-weight="700" letter-spacing="1.5">CI / CD  AUTOMATION</text>

  <!-- Tekton box -->
  <rect x="70" y="370" width="300" height="72" rx="6" fill="#E8F6FB" stroke="#00A1DE" stroke-width="1" filter="url(#innerShadow)"/>
  <text x="90" y="392" fill="#003B70" font-size="14" font-weight="700">Tekton  (CI)</text>
  <line x1="90" y1="398" x2="175" y2="398" stroke="#E31837" stroke-width="1.5"/>
  <text x="90" y="416" fill="#3C4858" font-size="12">clone  ’  build image  ’  push</text>
  <text x="90" y="432" fill="#3C4858" font-size="12">’  update GitOps repo</text>

  <!-- Arrow Tekton to ArgoCD -->
  <line x1="370" y1="406" x2="410" y2="406" stroke="#003B70" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#003B70"/></marker></defs>

  <!-- ArgoCD box -->
  <rect x="420" y="370" width="300" height="72" rx="6" fill="#E8F6FB" stroke="#00A1DE" stroke-width="1" filter="url(#innerShadow)"/>
  <text x="440" y="392" fill="#003B70" font-size="14" font-weight="700">ArgoCD  (CD)</text>
  <line x1="440" y1="398" x2="540" y2="398" stroke="#E31837" stroke-width="1.5"/>
  <text x="440" y="416" fill="#3C4858" font-size="12">GitOps  watches manifests repo</text>
  <text x="440" y="432" fill="#3C4858" font-size="12">auto-syncs to OpenShift cluster</text>

  <!-- GitHub box -->
  <rect x="750" y="370" width="280" height="72" rx="6" fill="#E8F6FB" stroke="#00A1DE" stroke-width="1" filter="url(#innerShadow)"/>
  <text x="770" y="392" fill="#003B70" font-size="14" font-weight="700">GitHub  (Source of Truth)</text>
  <line x1="770" y1="398" x2="930" y2="398" stroke="#E31837" stroke-width="1.5"/>
  <text x="770" y="416" fill="#3C4858" font-size="12">App Repo  code + devfile</text>
  <text x="770" y="432" fill="#3C4858" font-size="12">GitOps Repo  K8s manifests</text>

  <!-- Connecting lines between GitHub and Tekton/ArgoCD -->
  <line x1="750" y1="390" x2="720" y2="390" stroke="#8CB4D5" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="750" y1="420" x2="720" y2="420" stroke="#8CB4D5" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow down -->
  <polygon points="550,490 540,500 544,500 544,510 556,510 556,500 560,500" fill="#00A1DE"/>

  <!-- LAYER 3: Application Runtime -->
  <rect x="40" y="514" width="1020" height="110" rx="8" fill="#FFFFFF" stroke="#007A87" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="514" width="1020" height="32" rx="8" fill="url(#tealGrad)"/>
  <rect x="40" y="534" width="1020" height="12" fill="url(#tealGrad)"/>
  <text x="60" y="537" fill="#FFFFFF" font-size="13" font-weight="700" letter-spacing="1.5">APPLICATION RUNTIME</text>

  <!-- OpenShift box -->
  <rect x="70" y="560" width="960" height="48" rx="6" fill="#E6F2F3" stroke="#007A87" stroke-width="1" filter="url(#innerShadow)"/>
  <text x="90" y="582" fill="#003B70" font-size="14" font-weight="700">OpenShift Container Platform</text>
  <line x1="90" y1="588" x2="310" y2="588" stroke="#E31837" stroke-width="1.5"/>
  <text x="90" y="600" fill="#3C4858" font-size="12">FastMCP Python Server  ·  Deployment  ·  Service  ·  Route  ·  Auto-scaled pods</text>

  <!-- Arrow down -->
  <polygon points="550,624 540,634 544,634 544,644 556,644 556,634 560,634" fill="#007A87"/>

  <!-- LAYER 4: AI Services -->
  <rect x="40" y="648" width="1020" height="130" rx="8" fill="#FFFFFF" stroke="#003B70" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="648" width="1020" height="32" rx="8" fill="url(#navyGrad)"/>
  <rect x="40" y="668" width="1020" height="12" fill="url(#navyGrad)"/>
  <text x="60" y="671" fill="#FFFFFF" font-size="13" font-weight="700" letter-spacing="1.5">AI  SERVICES  ( ON-PREM )</text>
  <rect x="920" y="654" width="120" height="20" rx="4" fill="#E31837"/>
  <text x="942" y="668" fill="#FFFFFF" font-size="10" font-weight="700">AIR-GAPPED</text>

  <!-- Llama Stack box -->
  <rect x="70" y="694" width="460" height="68" rx="6" fill="#EBF0F5" stroke="#003B70" stroke-width="1" filter="url(#innerShadow)"/>
  <text x="90" y="716" fill="#003B70" font-size="14" font-weight="700">Llama Stack</text>
  <line x1="90" y1="722" x2="185" y2="722" stroke="#E31837" stroke-width="1.5"/>
  <text x="90" y="740" fill="#3C4858" font-size="12">Unified AI Runtime  OpenAI-compatible API gateway</text>
  <text x="90" y="754" fill="#3C4858" font-size="12">Model routing, safety, observability</text>

  <!-- vLLM box -->
  <rect x="560" y="694" width="470" height="68" rx="6" fill="#EBF0F5" stroke="#003B70" stroke-width="1" filter="url(#innerShadow)"/>
  <text x="580" y="716" fill="#003B70" font-size="14" font-weight="700">vLLM on OpenShift AI (RHOAI)</text>
  <line x1="580" y1="722" x2="800" y2="722" stroke="#E31837" stroke-width="1.5"/>
  <text x="580" y="740" fill="#3C4858" font-size="12">gpt-oss-120B  GPU-accelerated inference</text>
  <text x="580" y="754" fill="#3C4858" font-size="12">Code never leaves the network</text>

  <!-- Arrow between Llama Stack and vLLM -->
  <line x1="530" y1="728" x2="560" y2="728" stroke="#003B70" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Footer line -->
  <rect x="0" y="798" width="1100" height="22" fill="url(#navyGrad)"/>
  <text x="550" y="813" fill="#8CB4D5" font-size="10" text-anchor="middle" letter-spacing="0.5">Red Hat Developer Hub  ·  OpenShift  ·  Tekton  ·  ArgoCD  ·  Dev Spaces  ·  Goose  ·  Llama Stack  ·  vLLM</text>
</svg>
