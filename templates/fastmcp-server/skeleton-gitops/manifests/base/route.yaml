apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ${{ values.name }}
  labels:
    app: ${{ values.name }}
    backstage.io/kubernetes-id: ${{ values.name }}
spec:
  to:
    kind: Service
    name: ${{ values.name }}
  port:
    targetPort: ${{ values.port }}
  tls:
    termination: edge
