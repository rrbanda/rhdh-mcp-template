apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ${{ values.name }}-ci-cd
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.name }}
spec:
  params:
    - name: git-url
      type: string
      description: Git repository URL
    - name: git-revision
      type: string
      default: main
      description: Git revision to build
    - name: image-name
      type: string
      description: Fully qualified image name in the internal registry
    - name: deploy-namespace
      type: string
      description: OpenShift namespace to deploy into

  workspaces:
    - name: shared-workspace

  tasks:
    - name: clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: build-push
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - clone
      params:
        - name: IMAGE
          value: $(params.image-name)
        - name: TLS_VERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: deploy
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - build-push
      params:
        - name: SCRIPT
          value: |
            oc apply -f deploy/deployment.yaml -n $(params.deploy-namespace)
            oc rollout restart deployment/${{ values.name }} -n $(params.deploy-namespace)
            oc rollout status deployment/${{ values.name }} -n $(params.deploy-namespace) --timeout=120s
      workspaces:
        - name: manifest_dir
          workspace: shared-workspace
