apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-fastmcp-server
  title: FastMCP Server
  description: >
    Scaffold a FastMCP MCP server with GitOps CI/CD.
    Creates an application repo with Tekton CI pipeline and a separate
    GitOps repo with Kustomize manifests managed by ArgoCD for deployment.
    Includes Dev Spaces support for cloud-based development.
  annotations:
    backstage.io/kubernetes-id: create-fastmcp-server
  tags:
    - mcp
    - python
    - fastmcp
    - openshift
    - tekton
    - argocd
    - gitops
    - devspaces
spec:
  owner: platform-engineering
  type: service

  parameters:
    - title: Service Details
      required:
        - name
      properties:
        name:
          title: Service Name
          type: string
          description: Unique name for the MCP server (kebab-case).
          maxLength: 50
          pattern: '^([a-zA-Z][a-zA-Z0-9]*)(-[a-zA-Z0-9]+)*$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: A short description of what this MCP server does.
          default: A FastMCP server that wraps a REST API as MCP tools.
        owner:
          title: Owner
          type: string
          description: The Backstage entity that owns this component.
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]

    - title: API Configuration
      properties:
        apiBaseUrl:
          title: API Base URL
          type: string
          description: Base URL of the REST API this MCP server wraps.
          default: http://localhost:8080
        port:
          title: Server Port
          type: integer
          description: Port the MCP server listens on.
          default: 8000

    - title: Deployment
      required:
        - repoUrl
      properties:
        namespace:
          title: OpenShift Namespace
          type: string
          description: Target namespace for OpenShift deployment.
          default: mcp-servers
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - rrbanda

  steps:
    - id: generateSource
      name: Generate MCP Server Codebase
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./source
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          apiBaseUrl: ${{ parameters.apiBaseUrl }}
          port: ${{ parameters.port }}
          namespace: ${{ parameters.namespace }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    - id: publishSource
      name: Create Application Repository
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        sourcePath: ./source
        description: ${{ parameters.description }}
        repoVisibility: public

    - id: generateGitOps
      name: Generate GitOps Manifests
      action: fetch:template
      input:
        url: ./skeleton-gitops
        targetPath: ./gitops
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          apiBaseUrl: ${{ parameters.apiBaseUrl }}
          port: ${{ parameters.port }}
          namespace: ${{ parameters.namespace }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    - id: publishGitOps
      name: Create GitOps Repository
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ (parameters.repoUrl | parseRepoUrl).owner }}&repo=${{ (parameters.repoUrl | parseRepoUrl).repo }}-gitops
        defaultBranch: main
        sourcePath: ./gitops
        description: "GitOps manifests for ${{ parameters.name }}"
        repoVisibility: public

    - id: createWebhook
      name: Configure CI Webhook
      action: github:webhook
      input:
        repoUrl: ${{ parameters.repoUrl }}
        webhookUrl: https://el-fastmcp-listener-mcp-servers.apps.ocp.v7hjl.sandbox2288.opentlc.com
        contentType: json
        events:
          - push
        webhookSecret: pac-webhook-shared-secret

    - id: createArgoApp
      name: Create ArgoCD Application
      action: argocd:create-resources
      input:
        appName: ${{ parameters.name }}
        argoInstance: openshift-gitops
        namespace: ${{ parameters.namespace }}
        repoUrl: ${{ steps.publishGitOps.output.remoteUrl }}
        path: manifests/base
        labelValue: ${{ parameters.name }}

    - id: registerCatalog
      name: Register Component in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publishSource.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    - id: registerGitOps
      name: Register GitOps Resource in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publishGitOps.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Application Repository
        url: ${{ steps.publishSource.output.remoteUrl }}
      - title: GitOps Repository
        url: ${{ steps.publishGitOps.output.remoteUrl }}
      - title: Open in Dev Spaces
        icon: code
        url: https://devspaces.apps.ocp.v7hjl.sandbox2288.opentlc.com/#${{ steps.publishSource.output.remoteUrl }}
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps.registerCatalog.output.entityRef }}
